version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://postgres:postgres@db:5432/crm_pipeline
      # Map mock keys or live sandbox keys here
      # - MAGNIFIC_API_KEY=your_key
      # - CANVA_API_KEY=your_key
      # - LOFTY_API_KEY=your_key
      # - OPENAI_API_KEY=your_key
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/app/migrations

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=crm_pipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Automatically run the initial schema script on database creation
      - ./migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
