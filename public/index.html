<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Pipeline Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="icon">🚀</span>
                <h1>Media Pipeline</h1>
            </div>
            <div class="header-actions">
                <button id="refresh-btn" class="btn-secondary">Refresh Data</button>
                <div class="status-indicator">
                    <span class="dot"></span>
                    <span class="status-text">System Active</span>
                </div>
            </div>
        </header>

        <main>
            <aside>
                <nav>
                    <ul>
                        <li class="active"><a href="#"><span class="nav-icon">📊</span> Dashboard</a></li>
                        <li><a href="#"><span class="nav-icon">📁</span> Listings</a></li>
                        <li><a href="#"><span class="nav-icon">🛡️</span> Compliance</a></li>
                        <li><a href="#"><span class="nav-icon">⚙️</span> Settings</a></li>
                    </ul>
                </nav>

                <div class="stats-card">
                    <h3>Pipeline Stats</h3>
                    <div class="stat-item">
                        <span class="stat-label">Active Jobs</span>
                        <span id="active-jobs-count" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Completed Today</span>
                        <span id="completed-jobs-count" class="stat-value">0</span>
                    </div>
                </div>
            </aside>

            <section class="content">
                <div class="section-header">
                    <h2>Recent Pipeline Jobs</h2>
                    <p>Track your real estate marketing assets from raw photos to social publishing.</p>
                </div>

                <div class="jobs-list" id="jobs-container">
                    <div class="loading">Loading pipeline data...</div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for Job Details -->
    <div id="job-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
